<h2>Create Task</h2>

<form (ngSubmit)="onSubmit()">

  <div>
    <label>Title:</label>
    <input 
      type="text" 
      [(ngModel)]="title" 
      name="title" 
      required 
    />
  </div>

  <div>
    <label>Description:</label>
    <textarea 
      [(ngModel)]="description" 
      name="description">
    </textarea>
  </div>

  <button type="submit">Create Task</button>

</form>
